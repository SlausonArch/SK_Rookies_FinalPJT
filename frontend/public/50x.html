<!doctype html>
<html lang="ko">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>일시적인 오류</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;

      }

        padding: 24px;
      }

        margin: 0;
        color: #4b5563;
        line-height: 1.6;

  <body>
    <main>
      <h1>일시적인 오류가 발생했습니다.</h1>
      <p>잠시 후 다시 시도해 주세요.</p>
    </main>

  </html>
