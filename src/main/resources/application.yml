spring:
  application:
    name: sk-rookies-final-pjt
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${DB_USERNAME:SK_USER}
    password: ${DB_PASSWORD:password123}
    driver-class-name: oracle.jdbc.OracleDriver
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.OracleDialect
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "${KAKAO_REDIRECT_URI:{baseUrl}/login/oauth2/code/kakao}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope:
              - profile_nickname
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "${NAVER_REDIRECT_URI:{baseUrl}/login/oauth2/code/naver}"
            authorization-grant-type: authorization_code
            client-name: Naver
            scope:
              - name
              - email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
    org.springframework.web: INFO
    com.rookies.sk: INFO

jwt:
  secret: ${JWT_SECRET:your-very-secure-secret-key-at-least-256-bits-long}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  bank-frontend-url: ${BANK_FRONTEND_URL:http://localhost:25173}
  api-docs:
    enabled: ${APP_API_DOCS_ENABLED:false}
    path: ${APP_API_DOCS_PATH:docs/api_spec.md}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

server:
  port: ${SERVER_PORT:18080}
  server-header:
  forward-headers-strategy: framework
  tomcat:
    max-http-form-post-size: 10MB
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
