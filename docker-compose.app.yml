services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env.backend
    environment:
      - SERVER_FORWARD_HEADERS_STRATEGY=${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  uploads:
