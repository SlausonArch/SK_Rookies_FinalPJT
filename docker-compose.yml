services:
  # 1. Oracle Database (v23.4 Free - Mac M1/M2/M3 호환성 우수)
  oracle-db:
    image: gvenzl/oracle-free:23.4
    container_name: sk-oracle-db
    environment:
      - ORACLE_PASSWORD=${DB_PASSWORD}
      - APP_USER=${DB_USERNAME}
      - APP_USER_PASSWORD=${DB_PASSWORD}
      - ORACLE_HOME=/opt/oracle/product/23ai/dbhomeFree
      - ORA_NLS10=/opt/oracle/product/23ai/dbhomeFree/nls/data
      - NLS_LANG=AMERICAN_AMERICA.AL32UTF8
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./src/main/resources/db/schema.sql:/container-entrypoint-initdb.d/01_schema.sql # DDL
      - ./src/main/resources/db/init.sql:/container-entrypoint-initdb.d/02_init.sql # Seed data
    healthcheck:
      test: [ "CMD-SHELL", "echo 'exit' | sqlplus -L sys/${DB_PASSWORD}@localhost:1521/FREEPDB1 as sysdba" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # 2. Backend (Spring Boot Monolith)
  backend:
    build: .
    container_name: sk-backend
    ports:
      - "${APP_BIND_IP:-0.0.0.0}:${HOST_BACKEND_PORT:-18080}:8080"
    depends_on:
      oracle-db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    environment:
      - UPLOAD_DIR=/app/uploads
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.OracleDialect
      - SERVER_FORWARD_HEADERS_STRATEGY=${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_REDIRECT_URI=${NAVER_REDIRECT_URI}

  # 3. Frontend - Exchange & Admin
  exchange-front:
    build: ./frontend
    container_name: sk-exchange-front
    ports:
      - "${APP_BIND_IP:-0.0.0.0}:${HOST_EXCHANGE_FRONT_PORT:-15173}:3000"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_APP_MODE=exchange
    stdin_open: true
    tty: true

  # 4. Frontend - Bank
  bank-front:
    build: ./frontend
    container_name: sk-bank-front
    ports:
      - "${APP_BIND_IP:-0.0.0.0}:${HOST_BANK_FRONT_PORT:-15174}:3000"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_APP_MODE=bank
    stdin_open: true
    tty: true

volumes:
  oracle-data:
  uploads:
